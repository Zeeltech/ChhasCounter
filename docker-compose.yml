services:
  postgres:
    image: postgres:16-alpine
    container_name: chhas_postgres
    environment:
      POSTGRES_DB: chhas_db
      POSTGRES_USER: chhas_user
      POSTGRES_PASSWORD: chhas_pass
    ports:
      - "5432:5432"
    volumes:
      - chhas_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chhas_user -d chhas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chhas_pgdata:
