spring.application.name=tracker

# Database — overridden by DATABASE_URL / DB_USERNAME / DB_PASSWORD env vars in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/chhas_db}
spring.datasource.username=${DB_USERNAME:chhas_user}
spring.datasource.password=${DB_PASSWORD:chhas_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8081}
server.servlet.context-path=/api

# CORS — comma-separated list of allowed origins, overridden in production
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}
